name: Stress test

on:
  push:
    branches:
      - master

jobs:
  run-server:
    name: Run server and stress test with k6
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: tighten
          POSTGRES_PASSWORD: rename
          POSTGRES_DB: embassy
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - uses: bahmutov/npm-install@v1
      - name: Setup the project
        run: |
          npm run db:create
          npm run typeorm migration:run
          npm run db:seed
          npm run build
          npm prune --production
        env:
          DATABASE_URL: postgres://tighten:rename@localhost:${{ job.services.postgres.ports['5432'] }}/embassy
      - name: Run the server
        run: npm start &
        env:
          PORT: 3000
          NODE_ENV: production
          APP_SECRET: laborum-cupidatat-officia-duis-dolor-nisi-esse
          DATABASE_URL: postgres://tighten:rename@localhost:${{ job.services.postgres.ports['5432'] }}/embassy
          ALLOWED_ORIGINS: "*"
      - name: Run k6 local test
        uses: grafana/run-k6-action@v1
        with:
          path: |
            ./stress-test/main.js
      - uses: actions/upload-artifact@v7
        with:
          name: stress-test-result
          path: stress-test-result.*
