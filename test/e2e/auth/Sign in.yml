info:
  name: Sign in
  type: http
  seq: 2

http:
  method: POST
  url: "{{API_URL}}/auth/login"
  headers:
    - name: Content-Type
      value: application/x-www-form-urlencoded
  body:
    type: form-urlencoded
    data:
      - name: email
        value: john@doe.me
      - name: password
        value: Pa$$w0rd
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const authorization = res.getHeader('authorization');
        const [, token] = authorization?.split(' ') ?? [];

        bru.setVar('TOKEN', token);
    - type: tests
      code: |-
        const tv4 = require('tv4');

        test('given the response headers when they have an authorization header then the response is correct', () => {
          expect(res.getHeaders()).to.have.property('authorization').and.to.match(/Bearer .*/);
        });

        test('given the response body when it satisfies the user schema then it is correct', () => {
          const schema = {
            $ref: 'userSchema'
          };

          expect(tv4.validate(res.getBody(), schema)).to.equal(true);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: contains
      value: application/json
    - expression: res.body
      operator: isJson
    - expression: res.responseTime
      operator: lt
      value: "1000"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Missing credentials
    request:
      url: "{{API_URL}}/auth/login"
      method: POST
      headers:
        - name: Content-Type
          value: application/x-www-form-urlencoded
      body:
        type: form-urlencoded
        data:
          - name: email
            value: john@doe.me
          - name: password
            value: Pa$$w0rd
            disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
              "statusCode": 401,
              "error": "Unauthorized"
          }

