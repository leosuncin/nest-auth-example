info:
  name: Get a todo
  type: http
  seq: 3

http:
  method: GET
  url: "{{API_URL}}/todo/{{TODO_ID}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const tv4 = require('tv4');

        test('given the response body when it satisfies the todo schema then it is correct', () => {
          const schema = {
            $ref: 'todoSchema'
          };

          expect(tv4.validate(res.getBody(), schema)).to.equal(true);
        });

        test('given the response body when the todo\'s id equals to the parameter then it is correct', () => {
          expect(res.getBody()).to.have.property('id', bru.getVar('TODO_ID'));
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: contains
      value: application/json
    - expression: res.body
      operator: isJson
    - expression: res.responseTime
      operator: lt
      value: "1000"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
